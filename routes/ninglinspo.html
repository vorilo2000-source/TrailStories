<!-- =======================================================
     ninglinspo.html — v1.1.0
     TrailStories — route detail template
     Wijziging t.o.v. v1.0.0: hardcoded NL-tekst vervangen door
     data-i18n attributen (zie CLAUDE.md, sectie I18N & MEERTALIGHEID)
     ======================================================= -->
<!DOCTYPE html>
<html lang="nl" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Titel wordt door app.js aangevuld met de routenaam uit de juiste taal-data -->
  <title id="page-title">TrailStories</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/routes.css">
  <!-- Leaflet CSS — nodig voor de interactieve kaart (T2-001) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

  <!-- =====================================================
       1. HERO BANNER
       Full-width foto met route titel + regio overlay
       Geen data-i18n nodig: route-naam/regio komen uit de
       taal-specifieke route-JSON (data/i18n/<taal>/ninglinspo.json),
       niet uit ui-strings.json
       ===================================================== -->
  <header class="route-hero" id="route-hero">
    <div class="route-hero__overlay">
      <p class="route-hero__region" id="route-region"><!-- regio wordt hier door app.js ingevuld --></p>
      <h1 class="route-hero__title" id="route-title"><!-- routenaam wordt hier door app.js ingevuld --></h1>
    </div>
  </header>

  <main class="container">

    <!-- =====================================================
         2. STATS DASHBOARD
         Cijfers komen uit routes.json (taal-onafhankelijk),
         labels komen uit ui-strings.json (data-i18n)
         ===================================================== -->
    <section class="stats-dashboard" id="stats-dashboard" data-i18n-aria="aria.stats_dashboard">
      <div class="stat-item">
        <span class="stat-value" id="stat-distance">–</span>
        <span class="stat-label" data-i18n="stat.distance_label"></span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-duration">–</span>
        <span class="stat-label" data-i18n="stat.duration_label"></span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-elevation">–</span>
        <span class="stat-label" data-i18n="stat.elevation_label"></span>
      </div>
      <div class="stat-item">
        <!-- Badge-tekst (Makkelijk/Gemiddeld/Moeilijk) + kleur worden via JS ingesteld -->
        <span class="badge-difficulty" id="stat-difficulty">–</span>
        <span class="stat-label" data-i18n="stat.difficulty_label"></span>
      </div>
    </section>

    <hr class="divider">

    <!-- =====================================================
         3. INTERACTIVE MAP
         GPX overlay via Leaflet + OpenStreetMap tiles (T2-001/T2-002/T2-003)
         ===================================================== -->
    <section class="section" data-i18n-aria="aria.map_section">
      <h2 data-i18n="section.map"></h2>
      <div id="route-map" class="route-map"><!-- Leaflet map wordt hier async geïnitialiseerd door map.js --></div>
      <!-- Hoogteprofiel placeholder (T2-004) -->
      <div id="elevation-profile" class="elevation-profile"><!-- Hoogteprofiel grafiek volgt hier --></div>
    </section>

    <hr class="divider">

    <!-- =====================================================
         4. STORY SECTIONS
         Tekst + foto's afwisselend, gevuld vanuit route-JSON .story (T3-002)
         ===================================================== -->
    <section class="section container--narrow" data-i18n-aria="aria.story_section">
      <h2 data-i18n="section.story"></h2>
      <div id="story-content" class="story-content"><!-- Story blocks (tekst/afbeelding) worden hier gerenderd --></div>
    </section>

    <hr class="divider">

    <!-- =====================================================
         5. PHOTO GALLERY
         Masonry grid, gevuld vanuit route-JSON .media.images (T3-003)
         ===================================================== -->
    <section class="section" data-i18n-aria="aria.gallery_section">
      <h2 data-i18n="section.gallery"></h2>
      <div id="photo-gallery" class="photo-gallery"><!-- Foto's worden hier als masonry grid gerenderd --></div>
    </section>

    <hr class="divider">

    <!-- =====================================================
         6. PRAKTISCHE INFO
         Labels via ui-strings.json, waarden via route-JSON .practical_info
         ===================================================== -->
    <section class="section container--narrow" data-i18n-aria="aria.practical_info_section">
      <h2 data-i18n="section.practical_info"></h2>
      <dl class="practical-info" id="practical-info">
        <!-- Wordt gevuld via JS: dt-labels uit ui-strings.json (practical_info.*), dd-waarden uit route-JSON -->
      </dl>
    </section>

    <hr class="divider">

    <!-- =====================================================
         7. TIPS & WAARSCHUWINGEN
         Gevuld vanuit route-JSON .tips (lijst is altijd taal-specifiek, geen i18n-key nodig per item)
         ===================================================== -->
    <section class="section container--narrow" data-i18n-aria="aria.tips_section">
      <h2 data-i18n="section.tips"></h2>
      <ul class="tips-list" id="tips-list">
        <!-- Tips worden hier als lijst gerenderd -->
      </ul>
    </section>

    <hr class="divider">

    <!-- =====================================================
         8. RATING SAMENVATTING
         Labels via ui-strings.json (rating.*), waarden via route-JSON .rating
         ===================================================== -->
    <section class="section container--narrow" data-i18n-aria="aria.rating_section">
      <h2 data-i18n="section.rating"></h2>
      <div class="rating-summary" id="rating-summary">
        <!-- Rating-items worden hier gerenderd -->
      </div>
    </section>

  </main>

  <!-- =====================================================
       SCRIPTS
       Leaflet eerst (externe lib), dan eigen modules.
       app.js bevat de i18n-loader (T0-005) en moet als eerste
       eigen script draaien zodat taal-data beschikbaar is
       vóór routes.js/map.js de pagina vullen.
       ===================================================== -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/gpx.js"></script>
  <script src="../js/map.js"></script>
  <script src="../js/routes.js"></script>

</body>
</html>
