<div class="topbar-wrapper">
  <div class="topbar">

    <!-- LINKS: auth-slot (post-MVP) -->

      <!-- T0-006 / T6-001: auth widget komt hier -->
    </div>

    <!-- MIDDEN: logo + merknaam -->

      <img
        src="assets/images/Logo2.png"
        alt="MyTrailWalks logo"
        class="topbar__logo"

    <!-- RECHTS: taalwisselaar -->

      <select
        id="languageSwitcher"
